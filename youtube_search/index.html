<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamLine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="background-glow"></div>

    <header>
        <div class="logo">Stream<span>Line</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="What do you want to watch?">
            <button id="searchBtn">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
            </button>
        </div>
    </header>

    <main>
        <div class="videos-grid" id="videoResults">
            <!-- Dynamic cards will appear here -->
            <div class="empty-state">Enter a keyword above to discover videos</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
